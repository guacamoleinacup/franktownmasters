<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franktown Golf Majors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a2e1a;
    --green-mid: #2d4a2d;
    --green-light: #3d6b3d;
    --green-fade: #4a7c4a;
    --gold: #c9a84c;
    --gold-light: #e0c070;
    --gold-pale: #f5e8c0;
    --cream: #faf6ed;
    --cream-dark: #f0e8d5;
    --white: #ffffff;
    --text-dark: #1a1a1a;
    --text-mid: #3a3a3a;
    --text-light: #6a6a6a;
    --red: #8b2020;
    --red-light: #c0392b;
    --border: rgba(201,168,76,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-padding-top: 110px; /* header + tabs height */
  }

  body {
    font-family: 'Libre Baskerville', Georgia, serif;
    background: var(--green-deep);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--green-deep);
    border-bottom: 2px solid var(--gold);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .site-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .site-subtitle {
    font-size: 0.65rem;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sync-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--gold-light);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #888;
    transition: background 0.3s;
  }
  .sync-dot.live { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .sync-dot.error { background: var(--red-light); }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 3px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-gold {
    background: var(--gold);
    color: var(--green-deep);
    border-color: var(--gold);
    font-weight: 500;
  }
  .btn-gold:hover { background: var(--gold-light); border-color: var(--gold-light); }

  .btn-outline {
    background: transparent;
    color: var(--gold);
    border-color: var(--border);
  }
  .btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }

  .btn-sm { padding: 5px 10px; font-size: 0.65rem; }
  .btn-danger { background: var(--red); color: white; border-color: var(--red); }
  .btn-danger:hover { background: var(--red-light); }

  /* ── MAJOR TABS ── */
  .major-tabs {
    background: var(--green-mid);
    border-bottom: 1px solid var(--border);
  }

  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 13px 20px;
    color: var(--gold-light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    opacity: 0.6;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Mono', monospace;
  }

  .tab:hover { opacity: 0.9; }
  .tab.active { opacity: 1; border-bottom-color: var(--gold); color: var(--gold); }
  .tab .tab-year { font-size: 0.6rem; opacity: 0.7; display: block; }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── MAJOR HERO ── */
  .major-hero {
    background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .major-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .major-info .major-meta {
    font-size: 0.78rem;
    color: var(--gold-light);
    opacity: 0.8;
    letter-spacing: 0.05em;
    font-family: 'DM Mono', monospace;
  }

  .pot-display {
    text-align: right;
  }

  .pot-amount {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .pot-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 4px;
  }

  .pot-breakdown {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold-light);
    opacity: 0.6;
    margin-top: 2px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.02em;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ── LEADERBOARD TABLE ── */
  .lb-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .lb-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .lb-table th.num { text-align: center; }

  .lb-table td {
    padding: 11px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    vertical-align: middle;
    color: var(--cream);
  }

  .lb-table td.num { text-align: center; font-family: 'DM Mono', monospace; }

  .lb-table tr:hover td { background: rgba(201,168,76,0.05); }
  .lb-table tbody tr:active td { background: rgba(201,168,76,0.08); }

  .lb-table tr.leader td { background: rgba(201,168,76,0.08); }
  .lb-table tr.leader td:first-child { border-left: 3px solid var(--gold); }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    background: rgba(201,168,76,0.15);
    color: var(--gold-light);
  }

  .rank-badge.gold { background: var(--gold); color: var(--green-deep); }

  .player-name {
    font-weight: 700;
    color: var(--cream);
    font-size: 0.9rem;
  }

  .golfer-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .golfer-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--gold-light);
    background: rgba(201,168,76,0.07);
    white-space: nowrap;
    -webkit-tap-highlight-color: rgba(201,168,76,0.2);
    user-select: none;
  }
  .golfer-pill:active { background: rgba(201,168,76,0.2); }

  .golfer-pill.missed-cut {
    border-color: rgba(139,32,32,0.4);
    color: rgba(192,57,43,0.8);
    background: rgba(139,32,32,0.1);
    text-decoration: line-through;
  }

  .golfer-pill.withdrawn {
    border-color: rgba(100,100,100,0.4);
    color: rgba(150,150,150,0.8);
    background: rgba(100,100,100,0.1);
    text-decoration: line-through;
  }

  .golfer-pill.winner {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.15);
  }

  .golfer-pill.alternate {
    border-style: dashed;
    opacity: 0.7;
  }

  .score-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .score-under { color: #4caf50; }
  .score-over { color: var(--red-light); }
  .score-even { color: var(--gold-light); }
  .score-cut { color: rgba(150,150,150,0.6); font-size: 0.75rem; }

  .missed-cut-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(139,32,32,0.2);
    color: rgba(192,57,43,0.9);
    border: 1px solid rgba(139,32,32,0.3);
    margin-left: 4px;
  }

  /* ── GOLFER LEADERBOARD ── */
  .golfer-lb {
    background: var(--green-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .golfer-lb-header {
    padding: 14px 18px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .golfer-row {
    display: flex;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    gap: 12px;
    font-size: 0.82rem;
    transition: background 0.15s;
    min-height: 48px;
  }
  .golfer-row:active { background: rgba(201,168,76,0.1); }

  .golfer-row:hover { background: rgba(201,168,76,0.04); }
  .golfer-row:last-child { border-bottom: none; }

  .golfer-pos {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    width: 32px;
    color: var(--gold-light);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .golfer-name-cell {
    flex: 1;
    min-width: 0;
  }

  .golfer-name-main {
    font-weight: 700;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .golfer-owner {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--gold-light);
    opacity: 0.6;
    margin-top: 2px;
  }

  .golfer-score-cell {
    text-align: right;
    flex-shrink: 0;
  }

  .golfer-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-light);
    color: rgba(200,200,200,0.5);
    margin-top: 1px;
  }

  /* ── GRID LAYOUT ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }



  /* ── TEAM STANDINGS CARD ── */
  .standings-card {
    background: var(--green-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .standings-card-header {
    padding: 14px 18px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    justify-content: space-between;
  }

  /* ── ADMIN MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--green-deep);
    border: 1px solid var(--gold);
    border-radius: 8px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--gold-light);
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.7;
    line-height: 1;
    padding: 0 4px;
  }
  .modal-close:hover { opacity: 1; }

  .modal-body { padding: 24px; }

  .admin-section {
    margin-bottom: 28px;
  }

  .admin-section h3 {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 120px;
  }

  .form-group label {
    font-family: 'DM Mono', monospace;
    font-size: 0.63rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.8;
  }

  .form-group input, .form-group select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    color: var(--cream);
    font-family: 'Libre Baskerville', serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
  }

  .form-group select option {
    background: var(--green-deep);
    color: var(--cream);
  }

  .player-roster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .player-roster-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 14px;
  }

  .player-roster-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .roster-inputs {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .roster-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .roster-slot-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.6;
    width: 20px;
    flex-shrink: 0;
  }

  .roster-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    color: var(--cream);
    font-size: 0.78rem;
    font-family: 'Libre Baskerville', serif;
    outline: none;
  }
  .roster-input-row input:focus { border-color: var(--gold); }
  .roster-input-row input.alt-input { border-style: dashed; opacity: 0.8; }

  /* ── STATUS CONTROLS ── */
  .status-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .status-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    padding: 7px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .status-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    color: var(--cream);
    vertical-align: middle;
  }

  .status-select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 8px;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    outline: none;
    cursor: pointer;
  }
  .status-select:focus { border-color: var(--gold); }
  .status-select option { background: var(--green-deep); }

  /* ── PASSWORD ── */
  .pw-gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px 0;
  }

  .pw-gate p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold-light);
    opacity: 0.8;
    letter-spacing: 0.06em;
  }

  .pw-gate input {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    width: 220px;
    text-align: center;
  }
  .pw-gate input:focus { border-color: var(--gold); }

  .pw-error {
    color: var(--red-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green-mid);
    border: 1px solid var(--gold);
    border-radius: 5px;
    padding: 12px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold-light);
    z-index: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    opacity: 0.5;
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: var(--gold-light);
  }

  /* ── LOADING ── */
  .loading-spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── WINNER BANNER ── */
  .winner-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 18px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .winner-trophy { font-size: 2rem; }

  .winner-text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 2px;
  }

  .winner-text p {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--gold-light);
    opacity: 0.8;
  }

  /* ── STANDINGS ACROSS MAJORS ── */
  .overall-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .overall-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .overall-table th:first-child { text-align: left; }

  .overall-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    text-align: center;
    vertical-align: middle;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--cream);
  }
  .overall-table td:first-child { text-align: left; font-family: 'Libre Baskerville', serif; font-weight: 700; }

  .major-col-header {
    font-size: 0.55rem !important;
  }

  .amount-positive { color: #4caf50; }
  .amount-negative { color: var(--red-light); }

  /* ── ROUND INDICATOR ── */
  .round-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
  }
  .round-upcoming { background: rgba(100,100,100,0.2); color: #aaa; border: 1px solid rgba(100,100,100,0.3); }
  .round-live { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); animation: pulse 2s infinite; }
  .round-complete { background: rgba(201,168,76,0.1); color: var(--gold-light); border: 1px solid var(--border); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── HISTORY TAB ── */
  .history-major-block {
    background: var(--green-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .history-major-header {
    padding: 18px 24px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .history-major-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 700;
  }

  .history-major-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold-light);
    opacity: 0.7;
    letter-spacing: 0.08em;
  }

  .history-winner-strip {
    display: flex;
    gap: 24px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(201,168,76,0.06);
    flex-wrap: wrap;
    align-items: center;
  }

  .history-winner-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .history-winner-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold-light);
    opacity: 0.6;
  }

  .history-winner-value {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold);
    font-weight: 600;
  }

  .history-roster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0;
  }

  .history-player-cell {
    padding: 14px 20px;
    border-right: 1px solid rgba(201,168,76,0.08);
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }

  .history-player-cell:nth-child(even) { border-right: none; }

  .history-player-name {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--cream);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-player-banked {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
  }

  .history-player-picks {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .history-pick-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    padding: 2px 0;
  }

  .history-pick-name {
    font-family: 'Libre Baskerville', serif;
    color: var(--cream);
    opacity: 0.85;
  }

  .history-pick-name.cut {
    text-decoration: line-through;
    opacity: 0.4;
    color: var(--red-light);
  }

  .history-pick-name.winner-pick {
    color: var(--gold);
    font-weight: 700;
  }

  .history-pick-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  .history-empty {
    text-align: center;
    padding: 64px 24px;
  }

  .history-empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .history-empty-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold-light);
    opacity: 0.5;
    letter-spacing: 0.06em;
  }

  /* ── PLAYER CARD MODAL ── */
  .player-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
  }

  .player-modal {
    background: var(--green-deep);
    border: 1px solid var(--gold);
    border-radius: 10px;
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  }

  .player-modal-header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--green-deep);
    z-index: 10;
  }

  .player-modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.1;
  }

  .player-modal-meta {
    display: flex;
    gap: 14px;
    margin-top: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .player-modal-stat {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--gold-light);
    opacity: 0.8;
  }

  .player-modal-stat strong {
    color: var(--cream);
    font-size: 0.85rem;
  }

  .player-modal-score-big {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }

  .player-modal-close {
    background: none;
    border: none;
    color: var(--gold-light);
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.6;
    line-height: 1;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .player-modal-close:hover { opacity: 1; }

  .player-modal-body { padding: 20px 26px 26px; }

  .scorecard-round {
    margin-bottom: 22px;
  }

  .scorecard-round-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .scorecard-round-total {
    font-size: 0.8rem;
    opacity: 1;
  }

  .scorecard-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .scorecard-table th {
    background: rgba(0,0,0,0.25);
    color: var(--gold-light);
    opacity: 0.7;
    padding: 6px 8px;
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid rgba(201,168,76,0.1);
  }

  .scorecard-table th:first-child { text-align: left; padding-left: 12px; }

  .scorecard-table td {
    padding: 7px 8px;
    text-align: center;
    border-right: 1px solid rgba(201,168,76,0.08);
    color: var(--cream);
    border-bottom: 1px solid rgba(201,168,76,0.06);
  }

  .scorecard-table td:first-child { text-align: left; padding-left: 12px; color: var(--gold-light); opacity: 0.7; }

  .scorecard-table tr:last-child td { border-bottom: none; }

  .score-birdie { color: #4caf50; font-weight: 700; }
  .score-eagle  { color: #00e5ff; font-weight: 700; }
  .score-bogey  { color: #ef5350; }
  .score-double { color: #b71c1c; font-weight: 700; }
  .score-par    { color: var(--cream); opacity: 0.7; }
  .score-hole-E { color: var(--gold-light); }

  .scorecard-half-divider td {
    border-left: 2px solid var(--border);
    font-weight: 700;
    color: var(--gold-light) !important;
    opacity: 1 !important;
    background: rgba(0,0,0,0.1);
  }

  .player-card-owner-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 10px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    color: var(--gold-light);
    letter-spacing: 0.06em;
  }

  .player-card-loading {
    text-align: center;
    padding: 48px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold-light);
    opacity: 0.6;
  }

  .scorecard-no-data {
    text-align: center;
    padding: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: rgba(200,200,200,0.3);
  }

  /* par indicators in header row */
  .sc-par-row th { opacity: 0.45; font-size: 0.58rem; }




  /* ══════════════════════════════════════════
     RESPONSIVE — TABLET (≤900px)
  ══════════════════════════════════════════ */
  @media (max-width: 900px) {
    .two-col { grid-template-columns: 1fr; }
    .player-roster-grid { grid-template-columns: 1fr 1fr; }
    .overall-table { font-size: 0.72rem; }
    .overall-table th, .overall-table td { padding: 8px 8px; }
  }

  /* ══════════════════════════════════════════
     RESPONSIVE — MOBILE (≤768px)
  ══════════════════════════════════════════ */
  @media (max-width: 768px) {

    /* Header */
    .header-inner {
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
    }
    .site-title { font-size: 1.2rem; }
    .site-subtitle { font-size: 0.6rem; }
    .header-right { gap: 8px; }
    .sync-status span { display: none; } /* hide "Live" text, keep dot */

    /* Major tabs — horizontally scrollable */
    .tabs-inner { gap: 0; padding: 0 10px; }
    .tab { font-size: 0.62rem; padding: 10px 12px; letter-spacing: 0.06em; }
    .tab .tab-year { font-size: 0.52rem; }

    /* Main padding */
    .main { padding: 16px 12px; }

    /* Major hero */
    .major-hero {
      flex-direction: column;
      align-items: flex-start;
      padding: 18px 16px;
      gap: 14px;
    }
    .major-info h2 { font-size: 1.3rem; }
    .major-info .major-meta { font-size: 0.68rem; }
    .pot-display { text-align: left; }
    .pot-amount { font-size: 1.8rem; }

    /* Winner banners */
    .winner-banner { padding: 14px 16px; gap: 12px; }
    .winner-trophy { font-size: 1.5rem; }
    .winner-text h3 { font-size: 0.9rem; }
    .winner-text p { font-size: 0.65rem; }

    /* Section headers */
    .section-title { font-size: 0.95rem; }

    /* Team standings table — hide Cuts/Pot Add cols, show inline */
    .lb-table th, .lb-table td { padding: 9px 8px; }
    .lb-table th:nth-child(4),
    .lb-table td:nth-child(4),
    .lb-table th:nth-child(5),
    .lb-table td:nth-child(5) { display: none; }
    .player-name { font-size: 0.82rem; }
    .golfer-pill { font-size: 0.55rem; padding: 2px 5px; }

    /* Golfer leaderboard rows */
    .golfer-row { padding: 9px 12px; gap: 8px; }
    .golfer-name-main { font-size: 0.82rem; }
    .golfer-owner { font-size: 0.55rem; }

    /* Overall standings table */
    .standings-card { overflow-x: auto; }
    .overall-table { font-size: 0.68rem; min-width: 480px; }
    .overall-table th, .overall-table td { padding: 7px 7px; }
    .major-col-header { font-size: 0.5rem !important; }

    /* Make standings card scrollable horizontally */
    .standings-card-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Two-col grids collapse */
    .two-col { grid-template-columns: 1fr; gap: 16px; }

    /* History grid */
    .history-roster-grid { grid-template-columns: 1fr 1fr; }
    .history-player-cell { padding: 10px 12px; }
    .history-winner-strip { padding: 12px 16px; gap: 16px; }
    .history-major-header { padding: 14px 16px; }

    /* Admin modal */
    .modal { max-width: 100%; margin: 10px; border-radius: 8px; }
    .modal-body { padding: 16px; }
    .player-roster-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; gap: 10px; }

    /* Dividers */
    .divider { margin: 20px 0; }
  }

  /* ══════════════════════════════════════════
     RESPONSIVE — SMALL MOBILE (≤480px)
  ══════════════════════════════════════════ */
  @media (max-width: 480px) {
    .main { padding: 12px 10px; }

    /* Header tighter */
    .site-title { font-size: 1.05rem; }
    .btn-sm { padding: 5px 8px; font-size: 0.62rem; }

    /* Major hero */
    .major-info h2 { font-size: 1.15rem; }
    .pot-amount { font-size: 1.5rem; }

    /* Hide score column label on very small screens, keep value */
    .lb-table th:nth-child(3) { font-size: 0.55rem; }

    /* Golfer pills wrap tightly */
    .golfer-pills { gap: 3px; }
    .golfer-pill { font-size: 0.5rem; padding: 1px 4px; }

    /* History grid single column */
    .history-roster-grid { grid-template-columns: 1fr; }
    .history-player-cell { border-right: none; }

    /* Scorecard table horizontal scroll */
    .scorecard-round { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .scorecard-table { min-width: 520px; font-size: 0.6rem; }
    .scorecard-table td, .scorecard-table th { padding: 5px 5px; }

    /* Player modal full screen on tiny devices */
    .player-modal-overlay { padding: 0; align-items: flex-end; }
    .player-modal {
      max-width: 100%;
      max-height: 92vh;
      border-radius: 12px 12px 0 0;
      border-bottom: none;
    }
    .player-modal-header { padding: 16px 16px 12px; }
    .player-modal-name { font-size: 1.1rem; }
    .player-modal-score-big { font-size: 1.5rem; }
    .player-modal-body { padding: 14px 16px 24px; }

    /* Overall season standings scrollable */
    .season-standings-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Pot breakdown wraps */
    .pot-breakdown { font-size: 0.6rem; }

    /* Round summary strip in player card */
    .summary-strip { gap: 10px; }

    /* Admin roster grid single col */
    .player-roster-grid { grid-template-columns: 1fr; }

    /* Status table font */
    .status-table { font-size: 0.75rem; }
    .status-table th, .status-table td { padding: 6px 8px; }
  }


  /* ── AUTOCOMPLETE ── */
  .autocomplete-wrap {
    position: relative;
    flex: 1;
  }

  .autocomplete-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--green-deep);
    border: 1px solid var(--gold);
    border-top: none;
    border-radius: 0 0 4px 4px;
    max-height: 180px;
    overflow-y: auto;
    z-index: 400;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .autocomplete-item {
    padding: 8px 12px;
    font-family: 'Libre Baskerville', serif;
    font-size: 0.8rem;
    color: var(--cream);
    cursor: pointer;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    transition: background 0.1s;
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.selected {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
  }

  .autocomplete-item em {
    font-style: normal;
    color: var(--gold);
    font-weight: 700;
  }

  .autocomplete-loading {
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold-light);
    opacity: 0.6;
  }


  /* ── TEAM CARDS ── */
  .team-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .team-card {
    background: var(--green-mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .team-card-leader {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.2);
  }

  .tc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
  }

  .tc-rank-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tc-rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    background: rgba(201,168,76,0.12);
    color: var(--gold-light);
    flex-shrink: 0;
  }

  .tc-rank-gold {
    background: var(--gold);
    color: var(--green-deep);
    font-weight: 700;
  }

  .tc-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--cream);
  }

  .tc-total {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tc-score {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
  }

  .tc-score-dash {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: rgba(200,200,200,0.3);
  }

  .tc-penalty {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--red-light);
    background: rgba(139,32,32,0.15);
    border: 1px solid rgba(139,32,32,0.3);
    border-radius: 4px;
    padding: 2px 5px;
  }

  .tc-golfers {
    padding: 8px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── GOLFER ROW INSIDE CARD ── */
  .golfer-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-radius: 5px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    gap: 8px;
  }

  .golfer-card:hover { background: rgba(201,168,76,0.08); border-color: var(--border); }
  .golfer-card:active { background: rgba(201,168,76,0.14); }

  .golfer-card.gc-cut { opacity: 0.5; }
  .golfer-card.gc-wd  { opacity: 0.35; }
  .golfer-card.gc-alt { opacity: 0.55; border-style: dashed; }

  .gc-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
    overflow: hidden;
  }

  .gc-name {
    font-size: 0.82rem;
    font-family: 'Libre Baskerville', serif;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .gc-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.06em;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .gc-tag-cut { background: rgba(139,32,32,0.2); color: var(--red-light); border: 1px solid rgba(139,32,32,0.3); }
  .gc-tag-wd  { background: rgba(100,100,100,0.2); color: #aaa; border: 1px solid rgba(100,100,100,0.3); }
  .gc-tag-win { font-size: 0.7rem; }
  .gc-tag-alt { background: rgba(201,168,76,0.1); color: var(--gold-light); border: 1px solid var(--border); }

  .gc-scores {
    display: grid;
    grid-template-columns: repeat(4, 28px) 34px;
    gap: 2px;
    flex-shrink: 0;
    align-items: center;
  }

  .gc-round {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-align: center;
    padding: 3px 2px;
    border-radius: 3px;
    background: rgba(0,0,0,0.15);
  }

  .gc-round-empty { color: rgba(200,200,200,0.2); background: transparent; }

  .gc-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    padding: 3px 4px;
    border-radius: 3px;
    background: rgba(0,0,0,0.2);
    border-left: 1px solid rgba(201,168,76,0.15);
  }

  /* Column header row inside team card */
  .tc-col-headers {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 10px 2px;
    margin-bottom: 2px;
  }

  .tc-col-left {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.4;
    flex: 1;
  }

  .tc-col-rounds {
    display: grid;
    grid-template-columns: repeat(4, 28px) 34px;
    gap: 2px;
    flex-shrink: 0;
  }

  .tc-col-rounds span {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const BIN_ID = '69d31dcc856a682189024e2a';
const API_KEY = '$2a$10$bi8u/5Db8qyxEsv/QYyvuu03trS2sjASrsf0TXa.m3CIfARihdZdS';
const ADMIN_PW = 'franktowngoats123!';
const POLL_INTERVAL = 8000;  // 8s JSONBin — matches Toon Squad proven config
const ESPN_POLL = 10000;  // 10s ESPN

const PLAYERS = ['Christian','Nick','Phil','Shaun','Ben','John','Josh','Sam'];

const MAJORS = [
  { id: 'masters2026',      name: 'The Masters',         year: 2026, dates: 'Apr 9–12',  course: 'Augusta National',       espnId: '401811941' },
  { id: 'pga2026',          name: 'PGA Championship',    year: 2026, dates: 'May 21–24', course: 'Quail Hollow Club',       espnId: null },
  { id: 'usopen2026',       name: 'U.S. Open',           year: 2026, dates: 'Jun 18–21', course: 'Shinnecock Hills',        espnId: null },
  { id: 'theopen2026',      name: 'The Open Championship', year: 2026, dates: 'Jul 16–19', course: 'Royal Portrush',        espnId: null },
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = null;
let activeMajorId = MAJORS[0].id;
let adminUnlocked = false;
let espnData = {}; // keyed by majorId
let pollTimer = null;
let espnTimer = null;
let syncFailCount = 0; // only show red after 2 consecutive failures

function isTournamentLive(majorId) {
  const now = new Date();
  const startDates = {
    masters2026: new Date('2026-04-09T07:00:00'),
    pga2026:     new Date('2026-05-21T07:00:00'),
    usopen2026:  new Date('2026-06-18T07:00:00'),
    theopen2026: new Date('2026-07-16T07:00:00'),
  };
  const endDates = {
    masters2026: new Date('2026-04-13T23:59:00'),
    pga2026:     new Date('2026-05-24T23:59:00'),
    usopen2026:  new Date('2026-06-21T23:59:00'),
    theopen2026: new Date('2026-07-19T23:59:00'),
  };
  return now >= (startDates[majorId] || Infinity) && now <= (endDates[majorId] || 0);
}

function isTournamentWeek(majorId) {
  // Tee times are valid from the Monday of tournament week (3 days before R1)
  const now = new Date();
  const teeTimes = {
    masters2026: new Date('2026-04-07T00:00:00'), // Mon before Masters
    pga2026:     new Date('2026-05-18T00:00:00'),
    usopen2026:  new Date('2026-06-15T00:00:00'),
    theopen2026: new Date('2026-07-13T00:00:00'),
  };
  const endDates = {
    masters2026: new Date('2026-04-13T23:59:00'),
    pga2026:     new Date('2026-05-24T23:59:00'),
    usopen2026:  new Date('2026-06-21T23:59:00'),
    theopen2026: new Date('2026-07-19T23:59:00'),
  };
  return now >= (teeTimes[majorId] || Infinity) && now <= (endDates[majorId] || 0);
}

// ══════════════════════════════════════════
// CROSS-TAB SYNC — instant sync without JSONBin requests
// ══════════════════════════════════════════
// When admin saves, we broadcast to all open tabs via localStorage event
// This gives instant sync for anyone with the site open on the same device
window.addEventListener('storage', e => {
  if (e.key === CACHE_KEY && e.newValue) {
    try {
      const fresh = JSON.parse(e.newValue);
      const h = JSON.stringify(fresh);
      if (h !== lastHash) {
        lastHash = h;
        state = migrateState(fresh);
        renderMain(true);
      }
    } catch(err) {}
  }
});

// ══════════════════════════════════════════
// LOCAL CACHE — render instantly on load
// ══════════════════════════════════════════
const CACHE_KEY = 'fgm_state_v1';

function saveCache(raw) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(raw)); } catch(e) {}
}

function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); } catch(e) { return null; }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  renderTabs();

  // Always render immediately — either from cache or fresh empty state
  const cached = loadCache();
  if (cached) {
    state = migrateState(cached);
  } else {
    // Render empty state immediately so page never hangs on loading
    state = migrateState({});
  }
  renderMain();
  setSyncStatus('syncing');
  setESPNStatus('pending');

  // Fetch live data in background — don't block UI
  syncPull().catch(() => {});
  startPolling();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  if (espnTimer) clearInterval(espnTimer);
  pollTimer = setInterval(syncPull, POLL_INTERVAL);
  espnTimer = setInterval(() => fetchESPN(activeMajorId).catch(() => {}), ESPN_POLL);
}

// ══════════════════════════════════════════
// JSONBIN
// ══════════════════════════════════════════
let lastHash = '';

async function syncPull() {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!r.ok) { setSyncStatus('error'); return; }
    const j = await r.json();
    const raw = j.record;
    const h = JSON.stringify(raw);
    if (h !== lastHash) {
      lastHash = h;
      state = migrateState(raw);
      saveCache(raw);
      setSyncStatus('live');
      syncFailCount = 0;
      fetchESPN(activeMajorId).catch(() => {});
      renderMain(true);
    } else {
      setSyncStatus('live');
      syncFailCount = 0;
    }
  } catch(e) {
    syncFailCount++;
    if (syncFailCount >= 2) setSyncStatus('error');
    console.warn('syncPull failed:', e.message);
    if (state) renderMain(true);
  }
}

async function syncPush() {
  setSyncStatus('syncing');
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(state)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    saveCache(state);
    setSyncStatus('live');
    showToast('Saved ✓');
    renderMain(true);
  } catch(e) {
    setSyncStatus('error');
    showToast('Save failed — check connection');
    console.warn('syncPush failed:', e.message);
  }
}

function migrateState(raw) {
  if (!raw || raw.init) raw = {};
  if (!raw.majors) raw.majors = {};
  MAJORS.forEach(m => {
    if (!raw.majors[m.id]) raw.majors[m.id] = {
      rosters: {},       // { playerName: { picks: [], alternate: '' } }
      statuses: {},      // { golferName: 'active'|'missed_cut'|'withdrawn'|'winner' }
      potExtra: {},      // { playerName: count of $5 additions }
      complete: false,
      teamWinner: '',
      majorWinner: '',
    };
    PLAYERS.forEach(p => {
      if (!raw.majors[m.id].rosters[p]) raw.majors[m.id].rosters[p] = { picks: ['','','','',''], alternate: '' };
      if (!raw.majors[m.id].potExtra[p]) raw.majors[m.id].potExtra[p] = 0;
    });
  });
  return raw;
}

// ══════════════════════════════════════════
// ESPN
// ══════════════════════════════════════════
async function fetchESPN(majorId) {
  const major = MAJORS.find(m => m.id === majorId);
  if (!major || !major.espnId) return;
  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${major.espnId}`;
    const r = await fetch(url);
    const j = await r.json();
    const competitors = j?.events?.[0]?.competitions?.[0]?.competitors || [];
    const scores = {};
    competitors.forEach(c => {
      const name = c.athlete?.displayName || '';
      if (!name) return;

      // to-par score: normalize '0' to 'E'
      let scoreDisp = c.score?.displayValue || 'E';
      if (scoreDisp === '0') scoreDisp = 'E';

      // Numeric to-par for summing team scores
      let toPar = 0;
      if (scoreDisp === 'E') toPar = 0;
      else { const n = parseInt(scoreDisp); toPar = isNaN(n) ? 0 : n; }

      // Position label (T2, 1, etc.)
      const pos = c.status?.position?.displayName || '';

      // Thru hole — ESPN stores as status.thru (int) or type.shortDetail ("F", "Thru 14")
      const thruRaw = c.status?.thru;
      const shortDetail = c.status?.type?.shortDetail || '';
      let thru = '';
      if (shortDetail === 'F' || shortDetail === 'F*') thru = 'F';
      else if (thruRaw != null && thruRaw !== '') thru = `${thruRaw}`;
      else if (shortDetail) thru = shortDetail;

      // Cut detection
      const statusId = c.status?.type?.id || '';
      const cut = statusId === 'cut' || shortDetail.toLowerCase().includes('cut');

      // Today's round score (last linescore entry)
      const todayVal = c.linescores?.slice(-1)?.[0]?.value ?? null;
      const todayDisp = todayVal != null
        ? (todayVal === 0 ? 'E' : (todayVal > 0 ? `+${todayVal}` : `${todayVal}`))
        : '';

      // Tee time — before round starts, ESPN puts tee time string in status.thru (e.g. "7:40 AM")
      const thruVal = c.status?.thru;
      const shortDetailVal = c.status?.type?.shortDetail || '';
      let teeTimeDisp = '';

      const etToCT = (timeStr) => {
        // Convert "10:20 AM" ET to CT by subtracting 1 hour
        const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if (!m) return timeStr + ' CT';
        let h = parseInt(m[1]), min = m[2], period = m[3].toUpperCase();
        // Convert to 24h, subtract 1, convert back
        if (period === 'PM' && h !== 12) h += 12;
        if (period === 'AM' && h === 12) h = 0;
        h -= 1; // ET -> CT
        if (h < 0) h += 24;
        const newPeriod = h >= 12 ? 'PM' : 'AM';
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        return `${displayH}:${min} ${newPeriod} CT`;
      };

      if (typeof thruVal === 'string' && /\d+:\d+\s*(AM|PM)/i.test(thruVal)) {
        teeTimeDisp = etToCT(thruVal);
      } else if (/\d+:\d+\s*(AM|PM)/i.test(shortDetailVal)) {
        teeTimeDisp = etToCT(shortDetailVal);
      }
      if (!teeTimeDisp) {
        const teeTimeRaw = c.status?.teeTime || c.teeTime || null;
        if (teeTimeRaw) {
          try {
            const dt = new Date(teeTimeRaw);
            if (!isNaN(dt)) teeTimeDisp = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Chicago' }) + ' CT';
          } catch(e) {}
        }
      }

      const headshot = c.athlete?.headshot?.href || '';
      const country = c.athlete?.flag?.alt || c.athlete?.citizenship || '';
      const flagUrl = c.athlete?.flag?.href || '';
      // Extra profile info
      const birthDate = c.athlete?.dateOfBirth || c.athlete?.dob || '';
      const bp = c.athlete?.birthPlace || c.athlete?.birthplace || {};
      const birthPlace = [bp.city, bp.state, bp.country].filter(Boolean).join(', ');
      const age = birthDate ? Math.floor((Date.now() - new Date(birthDate)) / (365.25 * 24 * 3600 * 1000)) : null;
      const hand = c.athlete?.hand?.displayValue || c.athlete?.hand || '';
      const worldRank = c.statistics?.find(s => s.name === 'worldRanking')?.displayValue
        || c.statistics?.find(s => s.name === 'world_ranking')?.displayValue
        || c.athlete?.links?.find(l => l.rel?.includes('rank'))?.text || '';
      const earnings = c.statistics?.find(s => s.name === 'moneyList')?.displayValue
        || c.statistics?.find(s => s.name === 'earnings')?.displayValue || '';
      scores[name.toLowerCase()] = { score: scoreDisp, toPar, pos, thru, todayDisp, cut, teeTime: teeTimeDisp, headshot, country, flagUrl, birthDate, birthPlace, age, hand, worldRank, earnings, raw: c };
    });
    espnData[majorId] = scores;
    if (majorId === activeMajorId) {
      setESPNStatus('live');
      renderMain(true); // preserve scroll on ESPN update
    }
  } catch(e) {
    setESPNStatus('error');
    console.warn('ESPN fetch failed', e);
  }
}

function getGolferScore(majorId, golferName) {
  const data = espnData[majorId];
  if (!data) return null;
  const key = golferName.toLowerCase().trim();

  // 1. Exact match
  if (data[key]) return data[key];

  // 2. Normalize both sides: remove accents, dots, apostrophes
  const norm = s => s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove accents (Højgaard -> hojgaard)
    .replace(/[.'\u2019\u00f8]/g, '')  // remove dots/apostrophes, ø
    .replace(/ae/g, 'e').replace(/oe/g, 'e') // common Scandinavian substitutions
    .replace(/\s+/g, ' ').trim();

  const normKey = norm(golferName);
  for (const k of Object.keys(data)) {
    if (norm(k) === normKey) return data[k];
  }

  // 3. Last name exact match (only if unambiguous)
  const lastName = normKey.split(' ').pop();
  if (lastName.length > 3) {
    const lastMatches = Object.keys(data).filter(k => norm(k).split(' ').pop() === lastName);
    if (lastMatches.length === 1) return data[lastMatches[0]];
  }

  // 4. First + last name token match
  const keyTokens = normKey.split(' ');
  for (const k of Object.keys(data)) {
    const kTokens = norm(k).split(' ');
    if (keyTokens.every(t => kTokens.some(kt => kt.startsWith(t) || t.startsWith(kt)))) return data[k];
  }

  return null;
}

// ══════════════════════════════════════════
// POT CALC
// ══════════════════════════════════════════
function calcPot(majorId) {
  if (!state) return { base: 0, extra: 0, total: 0, half: 0 };
  const mData = state.majors[majorId];
  const base = PLAYERS.length * 20;
  let extra = 0;
  PLAYERS.forEach(p => { extra += (mData.potExtra[p] || 0) * 5; });
  const total = base + extra;
  return { base, extra, total, half: total / 2 };
}

// ══════════════════════════════════════════
// TEAM SCORE CALC
// ══════════════════════════════════════════
function calcTeamScore(majorId, playerName) {
  if (!state) return { score: null, scorers: [] };
  const mData = state.majors[majorId];
  const roster = mData.rosters[playerName];
  if (!roster) return { score: null, scorers: [] };

  let total = 0;
  let hasAny = false;
  const scorers = [];

  roster.picks.forEach(g => {
    if (!g) return;
    const status = mData.statuses[g] || 'active';
    const espn = getGolferScore(majorId, g);

    // Withdrawn golfers don't count at all (no score, no penalty contribution)
    if (status === 'withdrawn') {
      scorers.push({ name: g, status, score: null });
      return;
    }

    // Missed cut: their R1+R2 score still counts toward team total
    // (owner pays $5 penalty separately, but score is kept)
    let toPar = null;
    if (espn) {
      toPar = espn.toPar ?? 0;
      hasAny = true;
    }
    scorers.push({ name: g, status, score: toPar, espn });
    if (toPar !== null) total += toPar;
  });

  return { score: hasAny ? total : null, scorers };
}

// ══════════════════════════════════════════
// RENDER TABS
// ══════════════════════════════════════════
function renderTabs() {
  const el = document.getElementById('majorTabs');
  const majorBtns = MAJORS.map(m => `
    <button class="tab${m.id===activeMajorId&&activeView==='major'?' active':''}" onclick="switchMajor('${m.id}')">
      ${m.name}
      <span class="tab-year">${m.year} · ${m.dates}</span>
    </button>
  `).join('');
  const standingsBtn = `<button class="tab${activeView==='standings'?' active':''}" onclick="switchView('standings')">
    Standings
    <span class="tab-year">All-Time</span>
  </button>`;
  const historyBtn = `<button class="tab${activeView==='history'?' active':''}" onclick="switchView('history')">
    History
    <span class="tab-year">Group Results</span>
  </button>`;
  el.innerHTML = majorBtns + standingsBtn + historyBtn;
}

let activeView = 'major'; // 'major' | 'standings' | 'history'
let activeStandingsYear = 2026;

function switchMajor(id) {
  activeMajorId = id;
  activeView = 'major';
  renderTabs();
  setESPNStatus('pending');
  fetchESPN(id).catch(() => {});
  renderMain();
}

function switchView(view) {
  activeView = view;
  renderTabs();
  if (view === 'history') renderHistory();
  else if (view === 'standings') renderStandings();
  else renderMain();
}

// PAYOUT SUMMARY (shown at bottom of major view)
// ══════════════════════════════════════════
function renderPayoutSummary(majorId) {
  if (!state) return '';
  const mData = state.majors[majorId];
  const pot = calcPot(majorId);
  const major = MAJORS.find(m => m.id === majorId);

  // Penalties
  const penaltyRows = PLAYERS.filter(p => (mData.potExtra[p] || 0) > 0).map(p => {
    const count = mData.potExtra[p];
    const cutGolfers = (mData.rosters[p]?.picks || []).filter(g => g && mData.statuses[g] === 'missed_cut');
    return `<div class="payout-row">
      <span class="payout-label">${p}</span>
      <span class="payout-detail">${cutGolfers.join(', ')} missed cut</span>
      <span class="payout-amount payout-neg">+$${count * 5}</span>
    </div>`;
  }).join('');

  // Winners
  const teamWinnerRow = mData.teamWinner ? `
    <div class="payout-row payout-winner">
      <span class="payout-label">🥇 ${mData.teamWinner}</span>
      <span class="payout-detail">Low Team</span>
      <span class="payout-amount payout-pos">+$${pot.half}</span>
    </div>` : '';

  const majorWinnerOwner = PLAYERS.find(p => mData.rosters[p]?.picks?.includes(mData.majorWinner));
  const majorWinnerRow = mData.majorWinner ? `
    <div class="payout-row payout-winner">
      <span class="payout-label">🏆 ${majorWinnerOwner || '–'}</span>
      <span class="payout-detail">Drafted ${mData.majorWinner}</span>
      <span class="payout-amount payout-pos">+$${pot.half}</span>
    </div>` : '';

  return `
    <div class="divider"></div>
    <div class="section-header"><span class="section-title">Payouts</span></div>
    <div class="payout-card">
      <div class="payout-pot-row">
        <div class="payout-pot-item">
          <div class="payout-pot-label">Total Pot</div>
          <div class="payout-pot-val">$${pot.total}</div>
        </div>
        <div class="payout-pot-item">
          <div class="payout-pot-label">Low Team Prize</div>
          <div class="payout-pot-val">$${pot.half}</div>
        </div>
        <div class="payout-pot-item">
          <div class="payout-pot-label">Major Winner Prize</div>
          <div class="payout-pot-val">$${pot.half}</div>
        </div>
        ${pot.extra ? `<div class="payout-pot-item">
          <div class="payout-pot-label">Cut Penalties</div>
          <div class="payout-pot-val payout-neg">+$${pot.extra}</div>
        </div>` : ''}
      </div>
      ${penaltyRows || teamWinnerRow || majorWinnerRow ? `
        <div class="payout-divider"></div>
        ${penaltyRows}
        ${teamWinnerRow}
        ${majorWinnerRow}
      ` : `<div class="payout-empty">Payouts will appear here as the tournament progresses</div>`}
    </div>
  `;
}

function renderMain(preserveScroll = false) {
  if (!state) return;
  if (activeView === 'history') { renderHistory(); return; }
  const scrollY = preserveScroll ? window.scrollY : 0;
  const major = MAJORS.find(m => m.id === activeMajorId);
  const mData = state.majors[activeMajorId];
  const pot = calcPot(activeMajorId);
  const hasRosters = PLAYERS.some(p => mData.rosters[p]?.picks?.some(g => g));
  const live = isTournamentLive(activeMajorId);

  // Status badge
  const now = new Date();
  const startDates = { masters2026: new Date('2026-04-09'), pga2026: new Date('2026-05-21'), usopen2026: new Date('2026-06-18'), theopen2026: new Date('2026-07-16') };
  const endDates   = { masters2026: new Date('2026-04-13T23:59:00'), pga2026: new Date('2026-05-24T23:59:00'), usopen2026: new Date('2026-06-21T23:59:00'), theopen2026: new Date('2026-07-19T23:59:00') };
  let statusBadge = '';
  if (now < (startDates[activeMajorId] || Infinity)) statusBadge = `<span class="round-badge round-upcoming">Upcoming · ${major.dates}</span>`;
  else if (now > (endDates[activeMajorId] || 0) || mData.complete) statusBadge = `<span class="round-badge round-complete">Complete</span>`;
  else statusBadge = `<span class="round-badge round-live">● Live</span>`;

  let html = '';

  // ── HERO ──
  html += `
    <div class="major-hero">
      <div class="major-info">
        <h2>${major.name}</h2>
        <div class="major-meta">${major.year} &nbsp;·&nbsp; ${major.course} &nbsp;·&nbsp; ${major.dates} &nbsp;&nbsp;${statusBadge}</div>
      </div>
      <div class="pot-display">
        <div class="pot-amount">$${pot.total}</div>
        <div class="pot-label">Total Pot</div>
        <div class="pot-breakdown">$${pot.half} low team · $${pot.half} major winner${pot.extra ? ` · +$${pot.extra} penalties` : ''}</div>
      </div>
    </div>
  `;

  // ── WINNER BANNERS ──
  if (mData.majorWinner) {
    html += `<div class="winner-banner"><div class="winner-trophy">🏆</div><div class="winner-text"><h3>Major Champion: ${mData.majorWinner}</h3><p>Drafted by ${PLAYERS.find(p => mData.rosters[p]?.picks?.includes(mData.majorWinner)) || 'unknown'} · $${pot.half} prize</p></div></div>`;
  }
  if (mData.teamWinner) {
    html += `<div class="winner-banner"><div class="winner-trophy">🥇</div><div class="winner-text"><h3>Low Team: ${mData.teamWinner}</h3><p>Best combined score · $${pot.half} prize</p></div></div>`;
  }

  if (!hasRosters) {
    html += `<div class="empty-state"><p>Draft not yet entered — use Admin to set rosters</p></div>`;
    document.getElementById('mainContent').innerHTML = html;
    return;
  }

  // ── BUILD TEAM SCORES ──
  const teamScores = PLAYERS.map(p => {
    const ts = calcTeamScore(activeMajorId, p);
    const missedCount = mData.rosters[p]?.picks?.filter(g => g && mData.statuses[g] === 'missed_cut').length || 0;
    return { player: p, ...ts, missedCount };
  }).sort((a, b) => {
    if (a.score === null && b.score === null) return 0;
    if (a.score === null) return 1;
    if (b.score === null) return -1;
    return a.score - b.score;
  });

  // ── TEAM CARDS GRID ──
  html += `<div class="team-cards-grid">`;

  teamScores.forEach((ts, rank) => {
    const roster = mData.rosters[ts.player];
    const picks = roster?.picks || [];
    const alt = roster?.alternate || '';
    const isLeader = rank === 0 && ts.score !== null;
    const potAdd = (mData.potExtra[ts.player] || 0) * 5;

    const scoreDisp = live && ts.score !== null
      ? `<span class="tc-score ${ts.score < 0 ? 'score-under' : ts.score > 0 ? 'score-over' : 'score-even'}">${ts.score > 0 ? '+' : ''}${ts.score}</span>`
      : `<span class="tc-score-dash">–</span>`;

    html += `
      <div class="team-card${isLeader ? ' team-card-leader' : ''}">
        <div class="tc-header">
          <div class="tc-rank-name">
            <span class="tc-rank${isLeader ? ' tc-rank-gold' : ''}">${rank + 1}</span>
            <span class="tc-name">${ts.player}</span>
          </div>
          <div class="tc-total">
            ${scoreDisp}
            ${potAdd > 0 ? `<span class="tc-penalty">+$${potAdd}</span>` : ''}
          </div>
        </div>
        <div class="tc-golfers">
          <div class="tc-col-headers">
            <span class="tc-col-left">Golfer</span>
            <div class="tc-col-rounds">
              <span>R1</span><span>R2</span><span>R3</span><span>R4</span><span>TOT</span>
            </div>
          </div>
          ${picks.map(g => {
            if (!g) return '';
            const status = mData.statuses[g] || 'active';
            const isCut = status === 'missed_cut';
            const isWD = status === 'withdrawn';
            const isWinner = mData.majorWinner === g;
            const espnG = getGolferScore(activeMajorId, g);

            // Per-round scores from ESPN linescores
            const linescores = espnG?.raw?.linescores || [];
            const rounds = [];
            for (let r = 0; r < 4; r++) {
              const holes = linescores.slice(r * 18, r * 18 + 18);
              if (holes.length > 0) {
                const pars = (HOLE_PARS[activeMajorId] || Array(18).fill(4)).slice(0, holes.length);
                const strokes = holes.reduce((s, h) => s + (parseInt(h.value) || 0), 0);
                const par = pars.reduce((a, b) => a + b, 0);
                const toPar = strokes - par;
                rounds.push(toPar);
              }
            }

            const overallScore = live && espnG ? espnG.score : null;
            const overallCls = overallScore ? (overallScore.startsWith('-') ? 'score-under' : overallScore.startsWith('+') ? 'score-over' : 'score-even') : '';

            let statusTag = '';
            if (isCut) statusTag = '<span class="gc-tag gc-tag-cut">MC</span>';
            else if (isWD) statusTag = '<span class="gc-tag gc-tag-wd">WD</span>';
            else if (isWinner) statusTag = '<span class="gc-tag gc-tag-win">🏆</span>';

            const roundCells = live ? [0,1,2,3].map(r => {
              if (rounds[r] === undefined) return `<span class="gc-round gc-round-empty">–</span>`;
              const cls = rounds[r] < 0 ? 'score-under' : rounds[r] > 0 ? 'score-over' : 'score-even';
              return `<span class="gc-round ${cls}">${rounds[r] > 0 ? '+' : ''}${rounds[r]}</span>`;
            }).join('') : '<span class="gc-round gc-round-empty" style="grid-column:span 4">–</span>';

            const teeTimeStr = espnG?.teeTime || '';
            return `
              <div class="golfer-card${isCut ? ' gc-cut' : isWD ? ' gc-wd' : ''}" onclick="openPlayerModal('${g.replace(/'/g, "\'")}')">
                <div class="gc-name-row">
                  <div style="min-width:0;overflow:hidden">
                    <div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap;min-width:0">
                      ${espnG?.flagUrl && isTournamentWeek(activeMajorId) ? `<img src="${espnG.flagUrl}" alt="" style="width:14px;height:10px;object-fit:cover;border-radius:1px;flex-shrink:0" onerror="this.style.display='none'">` : ''}
                      <span class="gc-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g}</span>
                      ${statusTag}
                    </div>
                    ${teeTimeStr && !live && isTournamentWeek(activeMajorId) ? `<div class="gc-tee-time">⏰ ${teeTimeStr}</div>` : ''}
                  </div>
                </div>
                <div class="gc-scores">
                  ${roundCells}
                  <span class="gc-total ${overallCls}">${live && overallScore ? overallScore : '–'}</span>
                </div>
              </div>
            `;
          }).filter(Boolean).join('')}
          ${alt ? `
            <div class="golfer-card gc-alt" onclick="openPlayerModal('${alt.replace(/'/g, "\'")}')">
              <div class="gc-name-row">
                <span class="gc-name">${alt}</span>
                <span class="gc-tag gc-tag-alt">ALT</span>
              </div>
              <div class="gc-scores">
                <span class="gc-round gc-round-empty" style="grid-column:span 5">–</span>
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  });

  html += `</div>`;

  // ── PAYOUT SUMMARY ──
  html += renderPayoutSummary(activeMajorId);

  document.getElementById('mainContent').innerHTML = html;
  if (scrollY) window.scrollTo({ top: scrollY, behavior: 'instant' });
}


function renderOverallStandings() {
  const totals = {};
  PLAYERS.forEach(p => { totals[p] = { net: 0, majors: {} }; });

  MAJORS.forEach(m => {
    const mData = state.majors[m.id];
    const pot = calcPot(m.id);
    PLAYERS.forEach(p => {
      const paid = 20 + (mData.potExtra[p] || 0) * 5;
      let won = 0;
      if (mData.teamWinner === p) won += pot.half;
      const roster = mData.rosters[p];
      if (mData.majorWinner && roster?.picks?.includes(mData.majorWinner)) won += pot.half;
      totals[p].net += (won - paid);
      totals[p].majors[m.id] = won - paid;
    });
  });

  const sorted = PLAYERS.slice().sort((a,b) => totals[b].net - totals[a].net);

  let html = `
    <div class="standings-card">
      <table class="overall-table">
        <thead>
          <tr>
            <th>Player</th>
            ${MAJORS.map(m => `<th class="major-col-header">${m.name.replace('The ','').replace(' Championship','')}</th>`).join('')}
            <th>Net</th>
          </tr>
        </thead>
        <tbody>
  `;

  sorted.forEach(p => {
    html += `<tr>
      <td>${p}</td>
      ${MAJORS.map(m => {
        const v = totals[p].majors[m.id];
        const cls = v > 0 ? 'amount-positive' : v < 0 ? 'amount-negative' : '';
        return `<td class="${cls}">${v > 0 ? '+' : ''}$${v}</td>`;
      }).join('')}
      <td class="${totals[p].net > 0 ? 'amount-positive' : totals[p].net < 0 ? 'amount-negative' : ''}" style="font-weight:700">${totals[p].net > 0 ? '+' : ''}$${totals[p].net}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  return html;
}

function openAdmin() {
  document.getElementById('adminModal').style.display = 'flex';
  // Pause background polling while admin is open to avoid rate limits
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (espnTimer) { clearInterval(espnTimer); espnTimer = null; }
  if (!adminUnlocked) {
    document.getElementById('pwGate').style.display = 'flex';
    setTimeout(() => document.getElementById('pwInput')?.focus(), 100);
  } else {
    renderAdmin();
  }
}

function closeAdmin() {
  document.getElementById('adminModal').style.display = 'none';
  // Resume polling when admin is closed
  startPolling();
  syncPull(); // do one immediate pull to catch any changes
}

function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    adminUnlocked = true;
    document.getElementById('pwGate').style.display = 'none';
    renderAdmin();
  } else {
    document.getElementById('pwError').textContent = 'Incorrect password';
    document.getElementById('pwInput').value = '';
  }
}

// ── Admin helpers ──
function updatePick(player, slot, val) {
  state.majors[activeMajorId].rosters[player].picks[slot] = val.trim();
}
function updateAlt(player, val) {
  state.majors[activeMajorId].rosters[player].alternate = val.trim();
}
function saveRosters() { syncPush(); }

function updateStatus(golfer, owner, status) {
  state.majors[activeMajorId].statuses[golfer] = status;
  // Auto-sync pot penalties
  if (owner && (status === 'missed_cut' || status === 'withdrawn')) {
    // Count how many of this player's picks are cut/withdrawn
    const picks = state.majors[activeMajorId].rosters[owner]?.picks || [];
    const cutCount = picks.filter(g => g && (state.majors[activeMajorId].statuses[g]==='missed_cut'||state.majors[activeMajorId].statuses[g]==='withdrawn')).length;
    state.majors[activeMajorId].potExtra[owner] = cutCount;
  } else if (owner && status === 'active') {
    const picks = state.majors[activeMajorId].rosters[owner]?.picks || [];
    const cutCount = picks.filter(g => g && (state.majors[activeMajorId].statuses[g]==='missed_cut'||state.majors[activeMajorId].statuses[g]==='withdrawn')).length;
    state.majors[activeMajorId].potExtra[owner] = cutCount;
  }
  syncPush();
}

function adjPot(player, delta) {
  const cur = state.majors[activeMajorId].potExtra[player] || 0;
  state.majors[activeMajorId].potExtra[player] = Math.max(0, cur + delta);
  syncPush();
}

function saveWinners() {
  // Also mark winner status on golfer
  const winner = state.majors[activeMajorId].majorWinner;
  if (winner) state.majors[activeMajorId].statuses[winner] = 'winner';
  syncPush();
}

function renderHistory() {
  if (!state) return;
  const el = document.getElementById('mainContent');

  const completedMajors = MAJORS.filter(m => state.majors[m.id]?.complete || state.majors[m.id]?.majorWinner);

  if (completedMajors.length === 0) {
    el.innerHTML = `
      <div class="history-empty">
        <div class="history-empty-icon">⛳</div>
        <div class="history-empty-text">No completed majors yet — check back after The Masters</div>
      </div>
    `;
    return;
  }

  let html = '';

  completedMajors.forEach(major => {
    const mData = state.majors[major.id];
    const pot = calcPot(major.id);
    const hasRosters = PLAYERS.some(p => mData.rosters[p]?.picks?.some(g => g));

    // Build per-player net for this major
    const playerResults = PLAYERS.map(p => {
      const paid = 20 + (mData.potExtra[p] || 0) * 5;
      let won = 0;
      if (mData.teamWinner === p) won += pot.half;
      const roster = mData.rosters[p];
      if (mData.majorWinner && roster?.picks?.includes(mData.majorWinner)) won += pot.half;
      const net = won - paid;
      return { player: p, paid, won, net, roster };
    }).sort((a, b) => b.net - a.net);

    html += `
      <div class="history-major-block">
        <div class="history-major-header">
          <div>
            <div class="history-major-title">${major.name} ${major.year}</div>
            <div class="history-major-meta">${major.course} &nbsp;·&nbsp; ${major.dates}</div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--gold-light)">
            Total Pot: <span style="color:var(--gold);font-weight:700">$${pot.total}</span>
          </div>
        </div>

        <div class="history-winner-strip">
          ${mData.majorWinner ? `
            <div class="history-winner-item">
              <div class="history-winner-label">🏆 Major Champion</div>
              <div class="history-winner-value">${mData.majorWinner}</div>
            </div>
            <div class="history-winner-item">
              <div class="history-winner-label">Drafted By</div>
              <div class="history-winner-value">${PLAYERS.find(p => mData.rosters[p]?.picks?.includes(mData.majorWinner)) || '–'}</div>
            </div>
          ` : ''}
          ${mData.teamWinner ? `
            <div class="history-winner-item">
              <div class="history-winner-label">🥇 Low Team</div>
              <div class="history-winner-value">${mData.teamWinner}</div>
            </div>
          ` : ''}
          <div class="history-winner-item">
            <div class="history-winner-label">Each Half</div>
            <div class="history-winner-value">$${pot.half}</div>
          </div>
        </div>

        ${hasRosters ? `
        <div class="history-roster-grid">
          ${playerResults.map(pr => {
            const roster = pr.roster;
            const picks = roster?.picks || [];
            const alt = roster?.alternate || '';

            return `
              <div class="history-player-cell">
                <div class="history-player-name">
                  <span>${pr.player}</span>
                  <span class="history-player-banked ${pr.net > 0 ? 'amount-positive' : pr.net < 0 ? 'amount-negative' : ''}">${pr.net > 0 ? '+' : ''}$${pr.net}</span>
                </div>
                <div class="history-player-picks">
                  ${picks.map(g => {
                    if (!g) return '';
                    const st = mData.statuses[g] || 'active';
                    const isCut = st === 'missed_cut' || st === 'withdrawn';
                    const isWinner = mData.majorWinner === g;
                    const espnG = espnData[major.id]?.[g.toLowerCase()];
                    const scoreStr = espnG ? espnG.score : '–';
                    const scoreCls = scoreStr.startsWith('-') ? 'score-under' : scoreStr.startsWith('+') ? 'score-over' : scoreStr === 'E' ? 'score-even' : '';
                    return `
                      <div class="history-pick-row">
                        <span class="history-pick-name ${isCut ? 'cut' : isWinner ? 'winner-pick' : ''}">${isWinner ? '🏆 ' : ''}${g}${isCut ? ' (MC)' : ''}</span>
                        <span class="history-pick-score ${scoreCls}">${isCut ? '' : scoreStr}</span>
                      </div>
                    `;

                  ${alt ? `<div class="history-pick-row" style="margin-top:3px;opacity:0.5">
