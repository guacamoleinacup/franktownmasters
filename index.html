function renderPlayerScorecard(competitor, golferName, athleteProfile = null) {
  if (!competitor) competitor = getGolferScore(activeMajorId, golferName)?.raw || null;
  const pmBody = document.getElementById('pmBody');
  if (!pmBody) return;
  const pars = HOLE_PARS[activeMajorId] || Array(18).fill(4);
  const linescores = competitor.linescores || [];
  const status = competitor.status?.type?.shortDetail || '';
  const isCut = (competitor.status?.type?.id || '').toLowerCase().includes('cut');

  // ESPN linescores: each entry is one hole played (up to 72 holes = 4 rounds × 18)
  // group into rounds of 18
  const rounds = [];
  for (let r = 0; r < 4; r++) {
    const start = r * 18;
    const holes = linescores.slice(start, start + 18);
    if (holes.length > 0) rounds.push(holes);
  }

  const mData = state?.majors?.[activeMajorId];
  const owner = mData ? PLAYERS.find(p =>
    mData.rosters[p]?.picks?.includes(golferName) ||
    mData.rosters[p]?.alternate === golferName
  ) : null;

  let html = '';
  pmBody.innerHTML = '<div class="player-card-loading"><span class="loading-spinner"></span> Loading…</div>'; // briefly show then replace

  if (!isTournamentLive(activeMajorId)) {
    html = '<div class="scorecard-no-data">⛳ Round scores will appear here once play begins on April 9</div>';
  } else if (rounds.length === 0) {
    html = '<div class="scorecard-no-data">No holes played yet</div>';
  } else {
    rounds.forEach((holes, ri) => {
      const roundLabel = ['Round 1', 'Round 2', 'Round 3', 'Round 4'][ri];
      const roundTotal = holes.reduce((sum, h) => sum + (parseInt(h.value) || 0), 0);
      const roundPar = pars.slice(0, holes.length).reduce((a,b) => a+b, 0);
      const roundToPar = roundTotal - roundPar;
      const roundToParStr = roundToPar === 0 ? 'E' : (roundToPar > 0 ? `+${roundToPar}` : `${roundToPar}`);
      const roundToParCls = roundToPar < 0 ? 'score-under' : roundToPar > 0 ? 'score-over' : 'score-even';

      // front 9 / back 9
      const front = holes.slice(0, 9);
      const back  = holes.slice(9, 18);
      const frontPar  = pars.slice(0, 9).reduce((a,b)=>a+b,0);
      const backPar   = pars.slice(9, 18).reduce((a,b)=>a+b,0);
      const frontTotal = front.reduce((s,h) => s+(parseInt(h.value)||0), 0);
      const backTotal  = back.reduce((s,h)  => s+(parseInt(h.value)||0), 0);
      const totalStrokes = roundTotal;

      html += `
        <div class="scorecard-round">
          <div class="scorecard-round-title">
            <span>${roundLabel}${ri === rounds.length - 1 && holes.length < 18 ? ` (In Progress · Hole ${holes.length})` : ''}</span>
            <span class="scorecard-round-total ${roundToParCls}">${roundToParStr} &nbsp;(${totalStrokes} strokes)</span>
          </div>
          <table class="scorecard-table">
            <thead>
              <tr>
                <th>Hole</th>
                ${[1,2,3,4,5,6,7,8,9].map(h=>`<th>${h}</th>`).join('')}
                <th style="background:rgba(0,0,0,0.15);border-left:2px solid var(--border)">OUT</th>
                ${back.length > 0 ? [10,11,12,13,14,15,16,17,18].slice(0,back.length).map(h=>`<th>${h}</th>`).join('') : ''}
                ${back.length > 0 ? `<th style="background:rgba(0,0,0,0.15);border-left:2px solid var(--border)">IN</th>` : ''}
                ${back.length > 0 ? `<th style="background:rgba(0,0,0,0.15)">TOT</th>` : ''}
              </tr>
              <tr class="sc-par-row">
                <th>Par</th>
                ${pars.slice(0,9).map(p=>`<th>${p}</th>`).join('')}
                <th style="background:rgba(0,0,0,0.15);border-left:2px solid var(--border)">${frontPar}</th>
                ${back.length > 0 ? pars.slice(9, 9+back.length).map(p=>`<th>${p}</th>`).join('') : ''}
                ${back.length > 0 ? `<th style="background:rgba(0,0,0,0.15);border-left:2px solid var(--border)">${backPar}</th>` : ''}
                ${back.length > 0 ? `<th style="background:rgba(0,0,0,0.15)">${frontPar+backPar}</th>` : ''}
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>${golferName.split(' ').pop()}</td>
                ${front.map((h, hi) => {
                  const strokes = parseInt(h.value) || 0;
                  const par = pars[hi];
                  const diff = strokes - par;
                  let cls = '';
                  if (diff <= -2) cls = 'score-eagle';
                  else if (diff === -1) cls = 'score-birdie';
                  else if (diff === 1) cls = 'score-bogey';
                  else if (diff >= 2) cls = 'score-double';
                  else cls = 'score-par';
                  return `<td class="${cls}">${strokes || '–'}</td>`;
                }).join('')}
                ${front.length < 9 ? Array(9-front.length).fill('<td>–</td>').join('') : ''}
                <td style="border-left:2px solid var(--border);font-weight:700">${frontTotal || '–'}</td>
                ${back.map((h, hi) => {
                  const strokes = parseInt(h.value) || 0;
                  const par = pars[9+hi];
                  const diff = strokes - par;
                  let cls = '';
                  if (diff <= -2) cls = 'score-eagle';
                  else if (diff === -1) cls = 'score-birdie';
                  else if (diff === 1) cls = 'score-bogey';
                  else if (diff >= 2) cls = 'score-double';
                  else cls = 'score-par';
                  return `<td class="${cls}">${strokes || '–'}</td>`;
                }).join('')}
                ${back.length > 0 && back.length < 9 ? Array(9-back.length).fill('<td>–</td>').join('') : ''}
                ${back.length > 0 ? `<td style="border-left:2px solid var(--border);font-weight:700">${backTotal || '–'}</td>` : ''}
                ${back.length > 0 ? `<td style="font-weight:700">${totalStrokes}</td>` : ''}
              </tr>
            </tbody>
          </table>
        </div>
      `;
    });

    // Running to-par summary across all rounds
    html += `
      <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px">
        <div style="font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin-bottom:10px">Tournament Summary</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          ${rounds.map((holes, ri) => {
            const roundTotal = holes.reduce((sum, h) => sum + (parseInt(h.value) || 0), 0);
            const roundPar = pars.slice(0, holes.length).reduce((a,b)=>a+b,0);
            const toPar = roundTotal - roundPar;
            const toParStr = toPar === 0 ? 'E' : (toPar > 0 ? `+${toPar}` : `${toPar}`);
            const cls = toPar < 0 ? 'score-under' : toPar > 0 ? 'score-over' : 'score-even';
            return `
              <div style="text-align:center;min-width:52px">
                <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--gold-light);opacity:0.6;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">R${ri+1}</div>
                <div class="score-val ${cls}" style="font-size:1.1rem;font-weight:700">${toParStr}</div>
                <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:rgba(200,200,200,0.4);margin-top:2px">${roundTotal} strokes</div>
              </div>
            `;
          }).join('')}
          <div style="text-align:center;min-width:52px;border-left:1px solid var(--border);padding-left:20px">
            <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--gold-light);opacity:0.6;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Total</div>
            <div class="score-val ${(() => { const s = competitor.score?.displayValue || 'E'; return s.startsWith('-')?'score-under':s.startsWith('+')?'score-over':'score-even'; })()} " style="font-size:1.1rem;font-weight:700">${competitor.score?.displayValue || 'E'}</div>
            <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:rgba(200,200,200,0.4);margin-top:2px">${rounds.reduce((s,r)=>s+r.reduce((a,h)=>a+(parseInt(h.value)||0),0),0)} strokes</div>
          </div>
        </div>
      </div>
    `;
  }

  // Legend — only show when live
  if (isTournamentLive(activeMajorId)) {
    html += `
      <div style="margin-top:20px;display:flex;gap:14px;flex-wrap:wrap;font-family:'DM Mono',monospace;font-size:0.6rem;opacity:0.6">
        <span class="score-eagle">■ Eagle or better</span>
        <span class="score-birdie">■ Birdie</span>
        <span class="score-par">■ Par</span>
        <span class="score-bogey">■ Bogey</span>
        <span class="score-double">■ Double+</span>
      </div>
    `;
  }

  document.getElementById('pmBody').innerHTML = html;
}

// ══════════════════════════════════════════
// GOLFER AUTOCOMPLETE
// ══════════════════════════════════════════
let fieldCache = {}; // majorId -> [golfer names]
let activeDropdown = null;

async function fetchField(majorId) {
  if (fieldCache[majorId]?.length > 0) return fieldCache[majorId];
  const major = MAJORS.find(m => m.id === majorId);
  if (!major?.espnId) return [];
  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${major.espnId}`;
    const r = await fetch(url);
    const j = await r.json();
    const competitors = j?.events?.[0]?.competitions?.[0]?.competitors || [];
    const names = competitors.map(c => c.athlete?.displayName || '').filter(Boolean).sort();
    if (names.length > 0) fieldCache[majorId] = names;
    return fieldCache[majorId] || [];
  } catch(e) {
    console.warn('fetchField failed:', e);
    return [];
  }
}


function closeAllDropdowns() {
  document.querySelectorAll('.autocomplete-dropdown').forEach(d => d.remove());
  activeDropdown = null;
}

function highlightMatch(name, query) {
  if (!query) return name;
  let result = name;
  const words = query.trim().split(' ').filter(Boolean);
  words.forEach(word => {
    const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<em>$1</em>');
  });
  return result;
}

function showDropdown(input, player, slot) {
  const query = input.value.trim();
  closeAllDropdowns();
  updatePick(player, slot, query);

  const names = fieldCache[activeMajorId] || [];
  if (query.length < 1 || names.length === 0) return;

  const q = query.toLowerCase();
  const words = q.split(' ').filter(Boolean);
  const scoreMatch = name => {
    const n = name.toLowerCase();
    const parts = n.split(' ');
    if (n.startsWith(q)) return 0;
    if (parts.some(p => p.startsWith(q))) return 1;
    if (words.every(w => n.includes(w))) return 2;
    if (n.includes(q)) return 3;
    return 99;
  };
  const matches = names
    .map(n => ({ n, s: scoreMatch(n) }))
    .filter(x => x.s < 99)
    .sort((a, b) => a.s - b.s || a.n.localeCompare(b.n))
    .slice(0, 8)
    .map(x => x.n);

  if (matches.length === 0) return;

  const wrap = input.closest('.autocomplete-wrap');
  if (!wrap) return;

  const dropdown = document.createElement('div');
  dropdown.className = 'autocomplete-dropdown';
  matches.forEach(name => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    item.innerHTML = highlightMatch(name, query);
    const select = e => {
      e.preventDefault();
      e.stopPropagation();
      input.value = name;
      updatePick(player, slot, name);
      closeAllDropdowns();
    };
    item.addEventListener('mousedown', select);
    item.addEventListener('touchstart', select, { passive: false });
    dropdown.appendChild(item);
  });

  wrap.appendChild(dropdown);
  activeDropdown = dropdown;
}

async function handleRosterInput(input, player, slot) {
  updatePick(player, slot, input.value.trim());
  if (input.value.trim().length < 1) { closeAllDropdowns(); return; }

  if (fieldCache[activeMajorId]?.length > 0) {
    showDropdown(input, player, slot);
    return;
  }

  // Fetch from ESPN then show
  closeAllDropdowns();
  const wrap = input.closest('.autocomplete-wrap');
  if (!wrap) return;
  const loadingEl = document.createElement('div');
  loadingEl.className = 'autocomplete-dropdown';
  loadingEl.innerHTML = '<div class="autocomplete-loading"><span class="loading-spinner"></span> Loading field from ESPN…</div>';
  wrap.appendChild(loadingEl);

  await fetchField(activeMajorId);
  loadingEl.remove();

  if (document.body.contains(input) && input.value.trim().length > 0) {
    showDropdown(input, player, slot);
  }
}

async function handleAltInput(input, player) {
  updateAlt(player, input.value.trim());
  if (input.value.trim().length < 1) { closeAllDropdowns(); return; }

  if (fieldCache[activeMajorId]?.length > 0) {
    showDropdownForAlt(input, player);
    return;
  }

  closeAllDropdowns();
  const wrap = input.closest('.autocomplete-wrap');
  if (!wrap) return;
  const loadingEl = document.createElement('div');
  loadingEl.className = 'autocomplete-dropdown';
  loadingEl.innerHTML = '<div class="autocomplete-loading"><span class="loading-spinner"></span> Loading field from ESPN…</div>';
  wrap.appendChild(loadingEl);

  await fetchField(activeMajorId);
  loadingEl.remove();

  if (document.body.contains(input) && input.value.trim().length > 0) {
    showDropdownForAlt(input, player);
  }
}

function showDropdownForAlt(input, player) {
  const query = input.value.trim();
  closeAllDropdowns();
  updateAlt(player, query);

  const names = fieldCache[activeMajorId] || [];
  if (query.length < 1 || names.length === 0) return;

  const q = query.toLowerCase();
  const words = q.split(' ').filter(Boolean);
  const scoreMatch = name => {
    const n = name.toLowerCase();
    const parts = n.split(' ');
    if (n.startsWith(q)) return 0;
    if (parts.some(p => p.startsWith(q))) return 1;
    if (words.every(w => n.includes(w))) return 2;
    if (n.includes(q)) return 3;
    return 99;
  };
  const matches = names
    .map(n => ({ n, s: scoreMatch(n) }))
    .filter(x => x.s < 99)
    .sort((a, b) => a.s - b.s || a.n.localeCompare(b.n))
    .slice(0, 8)
    .map(x => x.n);

  if (matches.length === 0) return;

  const wrap = input.closest('.autocomplete-wrap');
  if (!wrap) return;

  const dropdown = document.createElement('div');
  dropdown.className = 'autocomplete-dropdown';
  matches.forEach(name => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    item.innerHTML = highlightMatch(name, query);
    const select = e => {
      e.preventDefault();
      e.stopPropagation();
      input.value = name;
      updateAlt(player, name);
      closeAllDropdowns();
    };
    item.addEventListener('mousedown', select);
    item.addEventListener('touchstart', select, { passive: false });
    dropdown.appendChild(item);
  });

  wrap.appendChild(dropdown);
  activeDropdown = dropdown;
}

// Close on outside tap/click — longer delay for mobile
document.addEventListener('touchstart', e => {
  if (!e.target.closest('.autocomplete-wrap')) closeAllDropdowns();
}, { passive: true });
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) closeAllDropdowns();
});

// STANDINGS TAB
// ══════════════════════════════════════════
const YEARS = [2026]; // add future years here

function renderStandings() {
  if (!state) return;
  const el = document.getElementById('mainContent');

  // Year selector
  const yearTabs = YEARS.map(y => `
    <button class="year-tab${y === activeStandingsYear ? ' active' : ''}" onclick="activeStandingsYear=${y};renderStandings()">
      ${y}
    </button>
  `).join('');

  // Filter majors for selected year
  const yearMajors = MAJORS.filter(m => m.year === activeStandingsYear);

  // Build totals
  const totals = {};
  PLAYERS.forEach(p => { totals[p] = { net: 0, majors: {}, paid: 0, won: 0 }; });

  yearMajors.forEach(m => {
    const mData = state.majors[m.id];
    const pot = calcPot(m.id);
    PLAYERS.forEach(p => {
      const paid = 20 + (mData.potExtra[p] || 0) * 5;
      let won = 0;
      if (mData.teamWinner === p) won += pot.half;
      const roster = mData.rosters[p];
      if (mData.majorWinner && roster?.picks?.includes(mData.majorWinner)) won += pot.half;
      const net = won - paid;
      totals[p].net += net;
      totals[p].paid += paid;
      totals[p].won += won;
      totals[p].majors[m.id] = { net, paid, won };
    });
  });

  const sorted = PLAYERS.slice().sort((a, b) => totals[b].net - totals[a].net);

  let html = `
    <div class="standings-hero">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gold)">Season Standings</div>
        <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--gold-light);opacity:0.7;margin-top:4px;letter-spacing:0.08em">Franktown Golf Majors · All-Time</div>
      </div>
      <div class="year-tabs">${yearTabs}</div>
    </div>

    <div class="standings-card" style="margin-bottom:28px">
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="overall-table">
        <thead>
          <tr>
            <th style="text-align:left;padding-left:16px">Player</th>
            ${yearMajors.map(m => `<th class="major-col-header">${m.name.replace('The ','').replace(' Championship','')}<br><span style="opacity:0.5;font-size:0.5rem">${m.dates}</span></th>`).join('')}
            <th>Paid In</th>
            <th>Won</th>
            <th style="color:var(--gold)">Net</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((p, i) => {
            const t = totals[p];
            const isLeader = i === 0 && t.net !== 0;
            return `<tr${isLeader ? ' style="background:rgba(201,168,76,0.06)"' : ''}>
              <td style="text-align:left;padding-left:16px;font-weight:700">
                ${isLeader ? '🥇 ' : ''}${p}
              </td>
              ${yearMajors.map(m => {
                const v = t.majors[m.id];
                if (!v) return '<td style="color:rgba(200,200,200,0.2)">–</td>';
                const cls = v.net > 0 ? 'amount-positive' : v.net < 0 ? 'amount-negative' : '';
                return `<td class="${cls}">${v.net > 0 ? '+' : ''}$${v.net}</td>`;
              }).join('')}
              <td style="color:rgba(200,200,200,0.5)">$${t.paid}</td>
              <td class="${t.won > 0 ? 'amount-positive' : ''}">${t.won > 0 ? '+' : ''}$${t.won}</td>
              <td class="${t.net > 0 ? 'amount-positive' : t.net < 0 ? 'amount-negative' : ''}" style="font-weight:700;font-size:0.9rem">${t.net > 0 ? '+' : ''}$${t.net}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;

  el.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function debugESPN() {
  const el = document.getElementById('espnDebugOut');
  if (!el) return;
  const data = espnData[activeMajorId];
  if (!data || Object.keys(data).length === 0) {
    el.textContent = 'No ESPN data loaded yet. Try clicking Refresh first.';
  } else {
    const lines = Object.entries(data).map(([k, v]) =>
      `${k.padEnd(30)} | score:${String(v.score).padEnd(5)} | thru:${String(v.thru).padEnd(8)} | teeTime:${v.teeTime || 'none'}`
    );
    el.textContent = `${lines.length} players loaded:\n\n` + lines.join('\n');
  }
  el.style.display = 'block';
}

function debugField() {
  const el = document.getElementById('espnDebugOut');
  if (!el) return;
  const field = fieldCache[activeMajorId];
  if (!field?.length) {
    el.textContent = 'Field cache empty. Open autocomplete or click Refresh.';
  } else {
    el.textContent = `${field.length} players in field cache:\n\n` + field.join('\n');
  }
  el.style.display = 'block';
}

function clearESPNCache() {
  delete fieldCache[activeMajorId];
  delete espnData[activeMajorId];
  lastESPNFetch = 0;
  fetchESPN(activeMajorId).catch(() => {});
  fetchField(activeMajorId).then(() => {
    const el = document.getElementById('espnDebugOut');
    if (el) { el.textContent = 'Cache cleared and refetched. Click Dump ESPN Data to see results.'; el.style.display = 'block'; }
  });
}

// ══════════════════════════════════════════
// VISIBILITY — re-fetch instantly when tab regains focus
// ══════════════════════════════════════════
let lastESPNFetch = 0;
const ESPN_DEBOUNCE = 8000;

const _origFetchESPN = fetchESPN;
fetchESPN = async function(majorId) {
  const now = Date.now();
  if (now - lastESPNFetch < ESPN_DEBOUNCE) return;
  lastESPNFetch = now;
  return _origFetchESPN(majorId);
};

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // Restart polling in case browser throttled/killed timers while hidden
    startPolling();
    // Force immediate fresh pull from JSONBin
    syncPull().catch(() => {});
    // Reset ESPN debounce so scores refresh immediately
    lastESPNFetch = 0;
    fetchESPN(activeMajorId).catch(() => {});
  }
});
window.addEventListener('focus', () => {
  startPolling();
  syncPull().catch(() => {});
  lastESPNFetch = 0;
  fetchESPN(activeMajorId).catch(() => {});
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePlayerModal();
    if (adminUnlocked) closeAdmin();
  }
});
